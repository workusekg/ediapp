<!DOCTYPE html>
<html>
<head>
  <title>EDI Rule Extractor</title>
</head>
<body>

<h2>Upload PDF → Extract Rules</h2>

<input type="file" id="fileInput" />
<button onclick="upload()">Upload</button>

<p id="status"></p>

<h3>Rules</h3>
<table border="1" id="rulesTable">
  <thead>
    <tr>
      <th>Segment</th>
      <th>Element</th>
      <th>Required</th>
      <th>Message</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<h3>JSON Output</h3>
<pre id="jsonOutput"></pre>

<script>
async function upload() {
  const file = document.getElementById("fileInput").files[0];
  if (!file) {
    alert("Please select a PDF");
    return;
  }

  document.getElementById("status").innerText = "Uploading...";

  const formData = new FormData();
  formData.append("file", file);

  const res = await fetch("https://YOUR-BACKEND-URL/upload", {
    method: "POST",
    body: formData
  });

  const data = await res.json();

  document.getElementById("status").innerText = "Done";

  renderTable(data.rules);
  document.getElementById("jsonOutput").textContent =
    JSON.stringify(data.rules, null, 2);
}

function renderTable(rules) {
  const tbody = document.querySelector("#rulesTable tbody");
  tbody.innerHTML = "";

  rules.forEach(r => {
    tbody.innerHTML += `
      <tr>
        <td>${r.segment || ""}</td>
        <td>${r.element}</td>
        <td>${r.required}</td>
        <td>${r.message}</td>
      </tr>
    `;
  });
}
</script>

</body>
</html>
