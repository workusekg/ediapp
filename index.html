<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EDI Auditor | Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .glass-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.3); }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#f8fafc] text-slate-900 overflow-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const SPECS = {
            'tj_4030': {
                name: "Trader Joe's (4030)",
                rules: {
                    'ST': { req: true, e: { 1: ['850'] } },
                    'BEG': { req: true, e: { 1: ['00'], 2: ['NE', 'SA'], 3: 'REQ' } },
                    'CUR': { req: false, e: { 2: ['USD', 'CAD'] } },
                    'DTM': { req: true, e: { 1: ['002'] } },
                    'N1': { req: true, e: { 1: ['ST', 'BT', 'VN'] } },
                    'PO1': { req: true, e: { 2: 'REQ', 4: 'REQ' } }
                }
            },
            'wfm_4010': {
                name: "Whole Foods (4010)",
                rules: {
                    'ST': { req: true, e: { 1: ['850'] } },
                    'BEG': { req: true, e: { 2: ['NE'] } },
                    'PO1': { req: true, e: { 7: ['UP', 'VC'] } }
                }
            }
        };

        const App = () => {
            const [partner, setPartner] = useState('tj_4030');
            const [input, setInput] = useState('');
            const [results, setResults] = useState(null);
            const [modal, setModal] = useState(false);
            const [fileName, setFileName] = useState('');

            const analyze = () => {
                if (!input.trim()) return;
                const segments = input.split('~').map(s => s.trim()).filter(Boolean);
                const spec = SPECS[partner].rules;
                let errs = 0, warns = 0;

                const data = segments.map((raw, i) => {
                    const el = raw.split('*');
                    const tag = el[0];
                    let status = 'pass', msgs = [];
                    const rule = spec[tag];

                    if (rule && rule.e) {
                        Object.entries(rule.e).forEach(([pos, v]) => {
                            const val = el[parseInt(pos)];
                            if (v === 'REQ' && !val) { status = 'error'; msgs.push(`Missing mandatory element ${tag}${pos.padStart(2,'0')}`); errs++; }
                            else if (Array.isArray(v) && !v.includes(val)) { status = 'warning'; msgs.push(`Invalid code: ${val}`); warns++; }
                        });
                    }
                    return { tag, raw, status, msgs };
                });

                setResults({ segments: data, stats: { total: segments.length, errs, warns } });
            };

            return (
                <div className="flex h-screen w-full">
                    {/* Sidebar */}
                    <aside className="w-64 bg-slate-900 p-6 flex flex-col shrink-0">
                        <div className="flex items-center gap-3 text-white mb-10">
                            <div className="w-8 h-8 bg-blue-500 rounded flex items-center justify-center font-bold text-xs">EDI</div>
                            <span className="font-bold tracking-tight">Compliance v1</span>
                        </div>
                        <nav className="flex-1 space-y-2">
                            <button className="w-full text-left px-4 py-3 rounded-xl bg-blue-600 text-white text-xs font-bold shadow-lg">🛡️ Auditor</button>
                        </nav>
                        <button onClick={() => setModal(true)} className="w-full py-4 rounded-xl border border-slate-700 text-slate-400 text-xs font-bold hover:bg-slate-800">➕ New Partner</button>
                    </aside>

                    {/* Content */}
                    <main className="flex-1 flex flex-col overflow-hidden">
                        <header className="h-16 bg-white border-b border-slate-200 px-8 flex items-center justify-between">
                            <h2 className="font-extrabold text-slate-700 text-sm uppercase tracking-wider">Validation Console</h2>
                            <div className="flex gap-3">
                                <select value={partner} onChange={e => setPartner(e.target.value)} className="bg-slate-100 border-none rounded-lg text-xs font-bold p-2 px-4 outline-none">
                                    <option value="tj_4030">Trader Joe's 4030</option>
                                    <option value="wfm_4010">Whole Foods 4010</option>
                                </select>
                                <button onClick={analyze} className="bg-blue-600 text-white px-6 py-2 rounded-lg text-xs font-bold shadow-lg shadow-blue-200 hover:bg-blue-700">RUN AUDIT</button>
                            </div>
                        </header>

                        <div className="flex-1 p-8 overflow-y-auto custom-scroll">
                            <div className="max-w-5xl mx-auto space-y-6">
                                {/* Dashboard */}
                                {results && (
                                    <div className="grid grid-cols-3 gap-4">
                                        <div className="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm">
                                            <p className="text-[10px] font-bold text-slate-400 uppercase">Segments</p>
                                            <p className="text-2xl font-black">{results.stats.total}</p>
                                        </div>
                                        <div className="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm ring-1 ring-red-100">
                                            <p className="text-[10px] font-bold text-red-400 uppercase">Errors</p>
                                            <p className="text-2xl font-black text-red-600">{results.stats.errs}</p>
                                        </div>
                                        <div className="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm">
                                            <p className="text-[10px] font-bold text-amber-500 uppercase">Warnings</p>
                                            <p className="text-2xl font-black text-amber-600">{results.stats.warns}</p>
                                        </div>
                                    </div>
                                )}

                                <div className="grid grid-cols-3 gap-6">
                                    <div className="col-span-1">
                                        <textarea 
                                            value={input} onChange={e => setInput(e.target.value)}
                                            className="w-full h-80 bg-white border border-slate-200 rounded-2xl p-4 text-[11px] font-mono outline-none shadow-sm focus:ring-2 focus:ring-blue-100"
                                            placeholder="Paste ISA segment here..."
                                        ></textarea>
                                    </div>
                                    <div className="col-span-2">
                                        {results ? (
                                            <div className="bg-white border border-slate-200 rounded-2xl overflow-hidden shadow-sm">
                                                <table className="w-full text-left border-collapse">
                                                    <thead className="bg-slate-50 text-[10px] font-bold text-slate-400 uppercase">
                                                        <tr>
                                                            <th className="p-4 w-12">St</th>
                                                            <th className="p-4 w-20">Tag</th>
                                                            <th className="p-4">Analysis</th>
                                                        </tr>
                                                    </thead>
                                                    <tbody className="divide-y divide-slate-100 font-mono text-[10px]">
                                                        {results.segments.map((s, i) => (
                                                            <tr key={i} className="hover:bg-slate-50">
                                                                <td className="p-4 text-center">{s.status === 'pass' ? '✅' : s.status === 'error' ? '❌' : '⚠️'}</td>
                                                                <td className="p-4 font-bold text-slate-600">{s.tag}</td>
                                                                <td className="p-4 leading-relaxed">
                                                                    {s.msgs.map((m, mi) => <p key={mi} className="text-red-500 font-bold mb-1">{m}</p>)}
                                                                    <span className="text-slate-400 opacity-60">{s.raw}</span>
                                                                </td>
                                                            </tr>
                                                        ))}
                                                    </tbody>
                                                </table>
                                            </div>
                                        ) : (
                                            <div className="h-64 border-2 border-dashed border-slate-200 rounded-2xl flex flex-col items-center justify-center text-slate-400">
                                                <p className="text-sm font-medium">No Data Processed</p>
                                                <p className="text-[10px]">Paste EDI string and click Run Audit</p>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </main>

                    {/* Modal */}
                    {modal && (
                        <div className="fixed inset-0 bg-slate-900/60 flex items-center justify-center p-6 z-50">
                            <div className="bg-white rounded-3xl w-full max-w-sm p-8 shadow-2xl relative">
                                <button onClick={() => setModal(false)} className="absolute top-4 right-4 text-slate-300 hover:text-slate-600">✕</button>
                                <h3 className="text-xl font-bold mb-6">Onboard Partner</h3>
                                <div className="space-y-6">
                                    <div>
                                        <label className="text-[10px] font-bold text-slate-400 uppercase block mb-2">Company</label>
                                        <input type="text" className="w-full bg-slate-50 border-none rounded-xl p-4 text-sm font-bold outline-none ring-1 ring-slate-100 focus:ring-2 focus:ring-blue-400" placeholder="e.g. Amazon" />
                                    </div>
                                    <div>
                                        <label className="text-[10px] font-bold text-slate-400 uppercase block mb-2">Spec PDF</label>
                                        <label className="w-full border-2 border-dashed border-slate-100 rounded-2xl p-6 flex flex-col items-center justify-center cursor-pointer hover:bg-slate-50">
                                            <input type="file" className="hidden" onChange={e => setFileName(e.target.files[0]?.name)} />
                                            <span className="text-xl mb-2">📄</span>
                                            <p className="text-[10px] font-bold text-slate-500">{fileName || 'Browse Files'}</p>
                                        </label>
                                    </div>
                                    <button onClick={() => setModal(false)} className="w-full bg-slate-900 text-white py-4 rounded-xl text-xs font-bold">SAVE PARTNER</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
