<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EDI Control | Compliance Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 overflow-hidden text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- SPECIFICATION RULES ---
        const PARTNER_SPECS = {
            'tj_4030': {
                name: "Trader Joe's (4030)",
                rules: {
                    'ST': { mandatory: true, elements: { 1: ['850'] } },
                    'BEG': { mandatory: true, elements: { 1: ['00'], 2: ['NE', 'SA', 'DS'], 3: 'REQ' } },
                    'DTM': { mandatory: true, elements: { 1: ['002'], 2: 'REQ' } },
                    'N1': { mandatory: true, elements: { 1: ['ST', 'BT', 'VN'], 3: ['1', '9', '91', '92'], 4: 'REQ' } },
                    'PO1': { mandatory: true, elements: { 2: 'REQ', 3: 'REQ', 4: 'REQ' } },
                    'CTT': { mandatory: true, elements: { 1: 'REQ' } }
                }
            },
            'wfm_4010': {
                name: "Whole Foods (4010)",
                rules: {
                    'ST': { mandatory: true, elements: { 1: ['850'] } },
                    'BEG': { mandatory: true, elements: { 1: ['00'], 2: ['NE'], 3: 'REQ' } },
                    'N1': { mandatory: true, elements: { 1: ['ST', 'BT'], 4: 'REQ' } },
                    'PO1': { mandatory: true, elements: { 7: ['UP', 'VC'] } }
                }
            }
        };

        const App = () => {
            const [selectedPartner, setSelectedPartner] = useState('tj_4030');
            const [ediInput, setEdiInput] = useState('');
            const [results, setResults] = useState(null);
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [selectedFile, setSelectedFile] = useState(null);

            const runAudit = () => {
                if (!ediInput.trim()) return;

                const segments = ediInput.split('~').map(s => s.trim()).filter(Boolean);
                const spec = PARTNER_SPECS[selectedPartner].rules;
                
                let errors = 0;
                let warnings = 0;
                const foundTags = new Set();

                const analysis = segments.map((segStr, idx) => {
                    const parts = segStr.split('*');
                    const tag = parts[0];
                    foundTags.add(tag);
                    
                    const rule = spec[tag];
                    let status = 'pass';
                    let messages = [];

                    if (rule && rule.elements) {
                        Object.entries(rule.elements).forEach(([pos, validation]) => {
                            const val = parts[parseInt(pos)];
                            if (validation === 'REQ' && (!val || val.trim() === '')) {
                                status = 'error';
                                messages.push(`Missing mandatory element at position ${pos}`);
                                errors++;
                            } else if (Array.isArray(validation) && !validation.includes(val)) {
                                status = 'warning';
                                messages.push(`Invalid code "${val}". Expected: ${validation.join(', ')}`);
                                warnings++;
                            }
                        });
                    }

                    return { id: idx, tag, raw: segStr, status, messages };
                });

                // Missing Mandatory Segments Check
                Object.entries(spec).forEach(([tag, rule]) => {
                    if (rule.mandatory && !foundTags.has(tag)) {
                        errors++;
                        analysis.unshift({
                            id: `miss-${tag}`,
                            tag: 'MISSING',
                            raw: `Critical: ${tag} segment is missing.`,
                            status: 'error',
                            messages: [`Required by ${PARTNER_SPECS[selectedPartner].name} spec.`]
                        });
                    }
                });

                setResults({ 
                    segments: analysis, 
                    summary: { errors, warnings, total: segments.length } 
                });
            };

            return (
                <div className="flex h-screen w-screen bg-slate-50">
                    {/* Sidebar */}
                    <aside className="w-72 bg-slate-900 p-8 flex flex-col shrink-0">
                        <div className="flex items-center gap-3 text-white mb-12">
                            <div className="w-10 h-10 bg-blue-600 rounded-2xl flex items-center justify-center font-black">ED</div>
                            <h1 className="font-bold text-base tracking-tight">EDI Control</h1>
                        </div>

                        <nav className="flex-1 space-y-2">
                            <button className="w-full flex items-center gap-3 px-5 py-4 rounded-2xl text-sm font-bold bg-blue-600 text-white shadow-lg shadow-blue-900/50">
                                <i data-lucide="shield-check" className="w-4 h-4"></i> Compliance
                            </button>
                        </nav>

                        <button onClick={() => setIsModalOpen(true)} className="w-full bg-blue-500/10 text-blue-400 border border-blue-500/20 p-5 rounded-[24px] flex items-center justify-center gap-2 font-bold text-sm hover:bg-blue-500/20 transition-all">
                            <i data-lucide="plus-circle" className="w-4 h-4"></i> New Partner
                        </button>
                    </aside>

                    {/* Main Content */}
                    <main className="flex-1 flex flex-col overflow-hidden">
                        <header className="h-20 bg-white border-b border-slate-200 px-10 flex items-center justify-between shrink-0">
                            <h2 className="text-xl font-black text-slate-800">Compliance Audit</h2>
                            <div className="flex items-center gap-4">
                                <select 
                                    className="bg-slate-100 border-none rounded-xl px-5 py-3 text-xs font-bold text-slate-600 outline-none"
                                    value={selectedPartner}
                                    onChange={(e) => setSelectedPartner(e.target.value)}
                                >
                                    <option value="tj_4030">Trader Joe's 850 (4030)</option>
                                    <option value="wfm_4010">Whole Foods 850 (4010)</option>
                                </select>
                                <button onClick={runAudit} className="bg-blue-600 text-white px-8 py-3 rounded-xl text-xs font-black hover:bg-blue-700 shadow-xl shadow-blue-200 transition-all active:scale-95">
                                    RUN ANALYSIS
                                </button>
                            </div>
                        </header>

                        <div className="flex-1 p-10 overflow-auto custom-scrollbar">
                            <div className="max-w-6xl mx-auto space-y-8">
                                
                                {/* SUMMARY CARDS */}
                                {results && (
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6 animate-in fade-in slide-in-from-top-4 duration-500">
                                        <div className="bg-white p-8 rounded-[32px] border border-slate-200 shadow-sm">
                                            <p className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Segments</p>
                                            <p className="text-3xl font-black text-slate-800">{results.summary.total}</p>
                                        </div>
                                        <div className="bg-white p-8 rounded-[32px] border border-slate-200 shadow-sm ring-2 ring-red-50">
                                            <p className="text-[10px] font-black text-red-400 uppercase tracking-widest mb-1">Errors</p>
                                            <p className="text-3xl font-black text-red-600">{results.summary.errors}</p>
                                        </div>
                                        <div className="bg-white p-8 rounded-[32px] border border-slate-200 shadow-sm">
                                            <p className="text-[10px] font-black text-amber-400 uppercase tracking-widest mb-1">Warnings</p>
                                            <p className="text-3xl font-black text-amber-600">{results.summary.warnings}</p>
                                        </div>
                                    </div>
                                )}

                                <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                                    <div className="lg:col-span-1">
                                        <div className="bg-white p-8 rounded-[32px] border border-slate-200 shadow-sm">
                                            <h3 className="text-[11px] font-black text-slate-400 uppercase tracking-widest mb-6">Input EDI Stream</h3>
                                            <textarea 
                                                className="w-full h-[400px] p-6 text-xs font-mono bg-slate-50 border border-slate-100 rounded-[24px] outline-none focus:ring-4 focus:ring-blue-50 transition-all resize-none"
                                                placeholder="Paste ISA segment stream here..."
                                                value={ediInput}
                                                onChange={(e) => setEdiInput(e.target.value)}
                                            ></textarea>
                                        </div>
                                    </div>

                                    <div className="lg:col-span-2">
                                        {results ? (
                                            <div className="bg-white border border-slate-200 rounded-[32px] overflow-hidden shadow-sm">
                                                <table className="w-full text-left">
                                                    <thead className="bg-slate-50 text-[10px] font-black text-slate-400 uppercase">
                                                        <tr>
                                                            <th className="p-6 w-20 text-center">Status</th>
                                                            <th className="p-6 w-24">Tag</th>
                                                            <th className="p-6">Trace & Analysis</th>
                                                        </tr>
                                                    </thead>
                                                    <tbody className="divide-y divide-slate-100">
                                                        {results.segments.map((seg, i) => (
                                                            <tr key={i} className="hover:bg-slate-50/50 transition-colors">
                                                                <td className="p-6 text-center">
                                                                    {seg.status === 'pass' && <span className="text-green-500">✅</span>}
                                                                    {seg.status === 'error' && <span className="text-red-500">❌</span>}
                                                                    {seg.status === 'warning' && <span className="text-amber-500">⚠️</span>}
                                                                </td>
                                                                <td className="p-6 font-black text-slate-700 text-xs">{seg.tag}</td>
                                                                <td className="p-6">
                                                                    {seg.messages.map((m, mi) => (
                                                                        <p key={mi} className="text-[11px] font-bold text-red-500 mb-1">{m}</p>
                                                                    ))}
                                                                    <code className="text-[10px] text-slate-400 block break-all font-mono opacity-60">{seg.raw}</code>
                                                                </td>
                                                            </tr>
                                                        ))}
                                                    </tbody>
                                                </table>
                                            </div>
                                        ) : (
                                            <div className="h-[520px] border-2 border-dashed border-slate-200 rounded-[32px] flex flex-col items-center justify-center text-slate-400 text-center p-12">
                                                <i data-lucide="layers" className="w-8 h-8 opacity-20 mb-4"></i>
                                                <h4 className="text-slate-900 font-bold mb-2">Ready for Audit</h4>
                                                <p className="text-xs max-w-xs">Paste an EDI payload to begin checking compliance against partner rules.</p>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </main>

                    {/* MODAL WITH BROWSE */}
                    {isModalOpen && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-md flex items-center justify-center p-8 z-50 animate-in fade-in duration-300">
                            <div className="bg-white rounded-[48px] w-full max-w-lg p-12 shadow-2xl relative border border-slate-100">
                                <button onClick={() => setIsModalOpen(false)} className="absolute top-10 right-10 text-slate-400 hover:text-slate-900 transition-colors">
                                    <i data-lucide="x" className="w-6 h-6"></i>
                                </button>
                                
                                <h2 className="text-3xl font-black text-slate-900 mb-3">Onboard Partner</h2>
                                <p className="text-slate-500 text-sm mb-12 font-medium">Upload a technical specification PDF.</p>
                                
                                <div className="space-y-8">
                                    <div>
                                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3 block">Company Name</label>
                                        <input type="text" className="w-full bg-slate-50 border-none rounded-2xl p-5 text-sm font-bold outline-none ring-2 ring-slate-100 focus:ring-4 focus:ring-blue-100" placeholder="e.g. Target Logistics" />
                                    </div>
                                    
                                    <div>
                                        <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3 block">Specification PDF</label>
                                        <label className={`w-full border-2 border-dashed rounded-[32px] p-12 flex flex-col items-center justify-center text-center transition-all cursor-pointer ${selectedFile ? 'border-green-400 bg-green-50' : 'border-slate-200 hover:border-blue-400'}`}>
                                            <input type="file" className="hidden" accept=".pdf" onChange={(e) => setSelectedFile(e.target.files[0])} />
                                            <i data-lucide={selectedFile ? "check-circle" : "file-up"} className={`w-10 h-10 mb-4 ${selectedFile ? 'text-green-500' : 'text-slate-300'}`}></i>
                                            <p className="text-sm font-bold text-slate-600">{selectedFile ? selectedFile.name : 'Browse PDF'}</p>
                                        </label>
                                    </div>

                                    <button onClick={() => { setIsModalOpen(false); setSelectedFile(null); }} className="w-full bg-slate-900 text-white font-black py-5 rounded-[24px] shadow-2xl hover:bg-black transition-all">
                                        FINISH ONBOARDING
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        useEffect(() => { lucide.createIcons(); });
        window.addEventListener('click', () => { setTimeout(() => lucide.createIcons(), 50); });
    </script>
</body>
</html>
